<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALL ROUNDER | TRY♡UT x LOVE</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Righteous&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #F0406A;
    --navy: #1B2A4A;
    --cream: #f7f3ee;
    --pink-light: #fce8ee;
    --peach-light: #fff2ea;
    --mint-light: #eaf5f2;
    --lavender-light: #eeeaf7;
    --yellow-light: #fdf8e8;
    --navy-light: #2d4270;
    --white: #ffffff;
    --text-sub: #8a8fa8;
    --border: #ece7df;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--cream);
  min-height: 100vh;
  overflow: hidden;
  position: relative;
  height: 100vh;
}

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(240,64,106,0.04) 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(27,42,74,0.04) 0%, transparent 45%),
      radial-gradient(circle at 80% 15%, rgba(255,165,100,0.03) 0%, transparent 40%),
      radial-gradient(circle at 20% 85%, rgba(80,180,160,0.03) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

.screen { 
  display: none; 
  position: fixed; 
  top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto; 
  background: var(--cream);
  z-index: 1; 
}
.screen.active { display: block; }

  /* ── 인트로 ── */
  #intro {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
  }

  .intro-badge {
    background: var(--navy);
    color: white;
    font-family: 'Righteous', cursive;
    font-size: 13px;
    letter-spacing: 3px;
    padding: 6px 18px;
    border-radius: 20px;
    margin-bottom: 20px;
    display: inline-block;
    animation: fadeDown 0.6s ease both;
  }

  .intro-title {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(48px, 12vw, 88px);
    color: var(--navy);
    line-height: 1;
    margin-bottom: 6px;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  .intro-title span { color: var(--pink); }

  .intro-sub {
    font-family: 'Righteous', cursive;
    font-size: clamp(16px, 4vw, 22px);
    color: var(--pink);
    letter-spacing: 4px;
    margin-bottom: 30px;
    animation: fadeDown 0.6s 0.2s ease both;
  }

  .intro-desc {
    font-size: 15px;
    color: var(--navy);
    opacity: 0.7;
    line-height: 1.8;
    max-width: 340px;
    margin-bottom: 30px;
    animation: fadeDown 0.6s 0.3s ease both;
  }

  .animals-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 30px;
    animation: fadeDown 0.6s 0.4s ease both;
  }

  .animal-chip {
    background: white;
    border: 2px solid var(--pink-light);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--navy);
    white-space: nowrap;
  }

  /* ── 이름 입력 ── */
  .name-input-wrap {
    width: 100%;
    max-width: 320px;
    margin-bottom: 20px;
    animation: fadeDown 0.6s 0.45s ease both;
  }

  .name-input-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--navy);
    opacity: 0.6;
    margin-bottom: 8px;
    display: block;
    text-align: left;
  }

  .name-input {
    width: 100%;
    border: 2px solid var(--pink-light);
    border-radius: 16px;
    padding: 14px 18px;
    font-family: 'Pretendard', sans-serif;
    font-size: 15px;
    color: var(--navy);
    background: white;
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
  }

  .name-input::placeholder { color: #ccc; }
  .name-input:focus { border-color: var(--pink); }

  .start-btn {
    background: var(--pink);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 18px 52px;
    font-family: 'Pretendard', sans-serif;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 8px 30px rgba(240,64,106,0.35);
    animation: fadeDown 0.6s 0.5s ease both;
    letter-spacing: 1px;
  }

  .start-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 36px rgba(240,64,106,0.45);
  }
  .start-btn:active { transform: translateY(0); }

  /* ── 퀴즈 ── */
  #quiz {
    min-height: 100vh;
    padding: 30px 20px 60px;
    max-width: 600px;
    margin: 0 auto;
  }

  .quiz-header {
    text-align: center;
    margin-bottom: 30px;
  }

  .quiz-logo {
    font-family: 'Bebas Neue', cursive;
    font-size: 22px;
    color: var(--pink);
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .progress-wrap {
    background: var(--pink-light);
    border-radius: 10px;
    height: 8px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--pink);
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  .progress-text {
    font-size: 12px;
    color: var(--navy);
    opacity: 0.5;
    margin-top: 8px;
    text-align: right;
  }

  .question-card {
    background: white;
    border-radius: 24px;
    padding: 32px 28px;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(27,42,74,0.08);
    animation: slideUp 0.4s ease both;
  }

  .q-number {
    font-family: 'Bebas Neue', cursive;
    font-size: 20px;
    color: var(--pink);
    letter-spacing: 3px;
    margin-bottom: 12px;
    font-weight: 400;
  }

  .q-text {
    font-size: 18px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.6;
  }

  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option-btn {
    background: white;
    border: 2px solid #e8e2d9;
    border-radius: 16px;
    padding: 16px 20px;
    font-family: 'Pretendard', sans-serif;
    font-size: 14px;
    color: var(--navy);
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    line-height: 1.5;
    animation: slideUp 0.4s ease both;
  }

  .option-btn:nth-child(1) { animation-delay: 0.05s; }
  .option-btn:nth-child(2) { animation-delay: 0.1s; }
  .option-btn:nth-child(3) { animation-delay: 0.15s; }
  .option-btn:nth-child(4) { animation-delay: 0.2s; }

  .option-btn:hover {
    border-color: var(--pink);
    background: var(--pink-light);
    transform: translateX(4px);
  }

  .option-btn.selected {
    border-color: var(--pink);
    background: var(--pink);
    color: white;
    font-weight: 700;
  }

  /* ── 결과 ── */
  #result {
    min-height: 100vh;
    padding: 40px 20px 80px;
    max-width: 600px;
    margin: 0 auto;
  }

  .result-top {
    text-align: center;
    margin-bottom: 20px;
    animation: fadeDown 0.5s ease both;
  }

  .result-badge {
    background: var(--navy);
    color: white;
    font-family: 'Righteous', cursive;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 5px 16px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 16px;
  }

  .result-title {
    font-size: 18px;
    font-weight: 900;
    color: var(--navy);
    margin-bottom: 4px;
  }

  .result-title span { color: var(--pink); }

  /* ── 캐릭터 카드 ── */
  .character-card {
    background: white;
    border-radius: 28px;
    padding: 28px 28px 32px;
    margin-bottom: 20px;
    box-shadow: 0 8px 40px rgba(27,42,74,0.1);
    position: relative;
    overflow: visible;
    animation: scaleIn 0.5s 0.1s ease both;
    text-align: center;
  }

  /* ── 이미지 + 키워드 둥둥 ── */
  .char-image-wrap {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 0 auto 20px;
  }

  .char-image {
    width: 190px;
    height: 190px;
    object-fit: contain;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    filter: drop-shadow(0 8px 20px rgba(240,64,106,0.2));
    z-index: 2;
  }

  .char-keywords {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
  }

  .keyword-tag {
    position: absolute;
    font-size: 11px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 20px;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    animation: floatKw 3s ease-in-out infinite;
  }
  .keyword-tag.kw0 { background: var(--pink-light); color: var(--pink); top: 6%; left: -8px; animation-delay: 0s; }
  .keyword-tag.kw1 { background: var(--peach-light); color: #d4631a; top: 30%; right: -8px; animation-delay: 0.7s; }
  .keyword-tag.kw2 { background: var(--mint-light); color: #2a8a72; bottom: 30%; left: -8px; animation-delay: 1.4s; }
  .keyword-tag.kw3 { background: var(--lavender-light); color: #6a4fc8; bottom: 6%; right: -4px; animation-delay: 2.1s; }
  .keyword-tag.kw4 { background: var(--yellow-light); color: #a07820; top: 0%; left: 50%; transform: translateX(-50%); animation-delay: 2.8s; }

  .char-name {
    font-size: 22px;
    font-weight: 900;
    color: var(--navy);
    margin-bottom: 8px;
  }

  .char-desc {
    font-size: 14px;
    color: var(--navy);
    opacity: 0.6;
    line-height: 1.7;
    white-space: pre-line;
  }

  /* ── 궁합 카드 ── */
  .match-section {
    animation: fadeDown 0.5s 0.3s ease both;
  }

  .match-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 14px;
    padding-left: 4px;
  }

  .match-card {
    background: white;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 12px;
    box-shadow: 0 4px 16px rgba(27,42,74,0.06);
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  .match-rank {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', cursive;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .match-rank.rank1 { background: var(--pink); color: white; }
  .match-rank.rank2 { background: var(--navy); color: white; }
  .match-rank.rank3 { background: var(--mint-light); color: var(--navy); }

  .match-info { flex: 1; }

  .match-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-sub);
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .match-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 6px;
  }

  .match-reason {
    font-size: 13px;
    color: var(--navy);
    opacity: 0.65;
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .match-place {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--cream);
    border-radius: 10px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--navy);
    font-weight: 500;
  }

  .retry-btn {
    background: transparent;
    border: 2px solid var(--navy);
    color: var(--navy);
    border-radius: 50px;
    padding: 14px 40px;
    font-family: 'Pretendard', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .retry-btn:hover {
    background: var(--navy);
    color: white;
    transform: translateY(-2px);
  }

  /* ── 애니메이션 ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes floatKw {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
  }
  .keyword-tag.kw4 {
    animation-name: floatKwCenter;
  }
  @keyframes floatKwCenter {
    0%, 100% { transform: translateX(-50%) translateY(0px); }
    50% { transform: translateX(-50%) translateY(-6px); }
  }



  .retry-wrap {
    text-align: center;
    margin-top: 30px;
    animation: fadeDown 0.5s 0.5s ease both;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
</style>
</head>
<body>

<!-- 인트로 -->
<div id="intro" class="screen active">
  <div class="intro-badge">ALL ROUNDER TEST</div>
  <div class="intro-title">TRY<span>♡</span>UT</div>
  <div class="intro-sub">× LOVE</div>
  <p class="intro-desc">
    경기장 밖 나는 어떤 모습일까?<br>
    12문항으로 알아보는 나의 경기장 밖 캐릭터 🏅

  <div class="animals-row">
    <span class="animal-chip">🦁 사자</span>

    <span class="animal-chip">🐯 호랑이</span>
    <span class="animal-chip">🐻 불곰</span>
    <span class="animal-chip">🦦 수달</span>
    <span class="animal-chip">🐸 개구리</span>
    <span class="animal-chip">🦥 나무늘보</span>
  </div>
  <div class="name-input-wrap">
    <label class="name-input-label">이름을 입력해주세요</label>
    <input class="name-input" id="nameInput" type="text" placeholder="ex) 홍길동" maxlength="10">
  </div>
  <button class="start-btn" onclick="startQuiz()">테스트 시작하기 →</button>
</div>

<!-- 퀴즈 -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <div class="quiz-logo">TRY♡UT × LOVE</div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>

  <div class="question-card" id="questionCard">
    <div class="q-number" id="qNumber">Q 01</div>

  <div class="options-grid" id="optionsGrid"></div>
</div>

<!-- 결과 -->
<div id="result" class="screen">
  <div class="character-card" id="characterCard">
    <div class="result-top">
      <div class="result-badge">YOUR RESULT</div>
      <div class="result-title" id="resultTitle"> 님의 경기장 밖 모습은?</div>
    </div>
    <div class="char-image-wrap">
      <img class="char-image" id="charImage" src="" alt="">
      <div class="char-keywords" id="charKeywords"></div>
    </div>
    <div class="char-name" id="charName"></div>
    <div class="char-desc" id="charDesc"></div>
  </div>

  <div class="match-section">
    <div class="match-title">함께하면 좋은 유형 🏃</div>
    <div id="matchCards"></div>
  </div>

  <div class="retry-wrap">
    <button class="retry-btn" onclick="restart()">다시 테스트하기</button>
  </div>
</div>

let scores = {};
let currentQ = 0;
let userName = '';

function startQuiz() {
  const input = document.getElementById('nameInput').value.trim();
  if (!input) {
    document.getElementById('nameInput').focus();
    document.getElementById('nameInput').style.borderColor = 'var(--pink)';
    document.getElementById('nameInput').placeholder = '이름을 입력해주세요 😊';
    return;
  }
  userName = input;
  Object.keys(ANIMALS).forEach(k => scores[k] = 0);
  currentQ = 0;
  showScreen('quiz');
  renderQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const pct = (currentQ / QUESTIONS.length) * 100;

  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = currentQ + ' / ' + QUESTIONS.length;
  document.getElementById('qNumber').textContent = 'Q.' + String(currentQ + 1).padStart(2, '0');
  document.getElementById('qText').textContent = q.text;

  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'slideUp 0.4s ease both';

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt.text;
    btn.style.animationDelay = (0.05 + i * 0.05) + 's';
    btn.onclick = () => selectOption(opt.animal, btn);
    grid.appendChild(btn);
  });
}

function selectOption(animal, btn) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  scores[animal] = (scores[animal] || 0) + 1;

  setTimeout(() => {
    currentQ++;
    if (currentQ < QUESTIONS.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 350);
}

function showResult() {
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const topAnimal = sorted[0][0];
  const data = ANIMALS[topAnimal];

  // 결과 제목에 이름 넣기
  document.getElementById('resultTitle').innerHTML = `<span>${userName}</span> 님의 경기장 밖 모습은?`;

  // 캐릭터 정보
  document.getElementById('charImage').src = data.image;
  document.getElementById('charName').textContent = data.name;
  document.getElementById('charDesc').textContent = data.desc;

  // 키워드 태그 (사이드)
  const kw = document.getElementById('charKeywords');
  kw.innerHTML = '';
  data.keywords.forEach((k, i) => {
    const tag = document.createElement('div');
    tag.className = `keyword-tag kw${i}`;
    tag.textContent = k;
    tag.style.animationDelay = (i * 0.1) + 's';
    kw.appendChild(tag);
  });

  // 궁합 카드
  const matchContainer = document.getElementById('matchCards');
  matchContainer.innerHTML = '';
  data.matches.forEach(m => {
    const card = document.createElement('div');
    card.className = 'match-card';
    card.innerHTML = `
      <div class="match-rank rank${m.rank}">${m.rank}</div>
      <div class="match-info">
        <div class="match-label">${m.label}</div>
        <div class="match-name">${m.name}</div>
        <div class="match-reason">${m.reason}</div>
        <div class="match-place">📍 ${m.place}</div>
      </div>
    `;
    matchContainer.appendChild(card);
  });

  showScreen('result');

  // 구글 시트 저장
  saveToSheet(
    userName,
    data.name,
    data.matches[0].name,
    data.matches[1].name,
    data.matches[2].name
  );
}

function saveToSheet(name, result, match1, match2, match3) {
  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, result, match1, match2, match3 })
  }).catch(err => console.log('시트 저장 오류:', err));
}


function restart() {
  scores = {};
  currentQ = 0;
  userName = '';
  document.getElementById('nameInput').value = '';
  showScreen('intro');
}
